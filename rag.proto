syntax = "proto3";
package rag;

option go_package = "./rag_grpc";

service RagService {
  rpc AddRag (RagRequest) returns (RagResponse) {}
  rpc SearchRag (RagSearchRequest) returns (RagSearchResponse) {}
  rpc AskRag (RagQuestionRequest) returns (RagQuestionResponse) {}
}

message RagRequest {
  string title=1;
  string article_id=2;
  string content=3;
}

message RagResponse {
  bool ok = 1;
}

message RagSearchRequest {
  string query = 1;
}

message RagSearchResponse {
  message RagItem {
    string article_id = 1;
    string title = 2;
  }
  repeated RagItem items = 1;
}

message RagQuestionRequest {
  string question = 1;
}

message RagQuestionResponse {
  string answer = 1;
}
//protoc --go_out=. --go-grpc_out=. rag.proto